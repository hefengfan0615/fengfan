<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Pikafish WASM 测试</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", sans-serif;
    background: #f4f6fb;
    color: #222;
  }
  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }
  h1 { margin: 0 0 16px; font-size: 22px; color: #2d3a5f; }
  .desc { color: #6b7280; margin-bottom: 18px; font-size: 14px; line-height: 1.6; }

  .card {
    background: #fff;
    border: 1px solid #e1e5ef;
    border-radius: 10px;
    padding: 18px;
    box-shadow: 0 1px 2px rgba(16,24,40,.04);
  }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 220px; }
  .field.fen { flex: 1 1 100%; }
  label { font-size: 13px; color: #475569; font-weight: 600; }
  input[type="text"], input[type="number"] {
    font: inherit;
    padding: 9px 11px;
    border: 1px solid #cbd2e0;
    border-radius: 6px;
    background: #fbfcff;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    width: 100%;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: #4f7cff;
    box-shadow: 0 0 0 3px rgba(79,124,255,.18);
    background: #fff;
  }
  .btn {
    padding: 9px 16px;
    border: none;
    border-radius: 6px;
    background: #4f7cff;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .btn:hover:not(:disabled) { background: #3b67e8; }
  .btn:disabled { background: #9fb0dc; cursor: not-allowed; }
  .btn.secondary { background: #64748b; }
  .btn.secondary:hover:not(:disabled) { background: #4b5b72; }

  .output-box {
    margin-top: 18px;
    background: #0f172a;
    color: #d1e0ff;
    border-radius: 8px;
    padding: 14px 16px;
    height: 420px;
    overflow-y: auto;
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .output-box .out { color: #d1e0ff; }
  .output-box .in  { color: #7ee2a8; }
  .output-box .err { color: #ff9aa8; }
  .output-box .sys { color: #9cb3ff; font-style: italic; }

  .status { margin-top: 10px; font-size: 13px; color: #5b6478; }

  /* 加载覆盖层 */
  #overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(15,23,42,.78);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #overlay.hidden { display: none; }
  .loader {
    background: #fff;
    padding: 28px 32px;
    border-radius: 12px;
    width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,.25);
    text-align: center;
  }
  .loader h2 { margin: 0 0 10px; font-size: 17px; color: #2d3a5f; }
  .loader p  { margin: 0 0 14px; font-size: 13px; color: #64748b; min-height: 20px; }
  .bar {
    width: 100%; height: 10px; background: #eef1f8;
    border-radius: 99px; overflow: hidden;
  }
  .bar > div {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#4f7cff,#7aa4ff);
    transition: width .2s ease;
  }
  .percent { margin-top: 10px; font-weight: 700; color: #2d3a5f; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="container">
  <h1>🧠 Pikafish WASM 引擎测试</h1>
  <div class="desc">
    输入 FEN 与思考时间（秒），点击「开始思考」。引擎以原生 UCI 协议（stdin / stdout）通信，
    输出将实时追加到下方文本框。WASM 二进制只在首次访问时下载，后续复用内存缓存。
  </div>

  <div class="card">
    <div class="row">
      <div class="field fen">
        <label for="fen">FEN</label>
        <input id="fen" type="text"
               value="rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w - - 0 1">
      </div>
    </div>
    <div class="row" style="margin-top:12px;">
      <div class="field" style="min-width:140px;">
        <label for="movetime">思考时间 (秒)</label>
        <input id="movetime" type="number" min="0.1" step="0.1" value="5">
      </div>
      <div class="field" style="min-width:140px;">
        <label>&nbsp;</label>
        <button id="btnRun" class="btn" disabled>开始思考</button>
      </div>
      <div class="field" style="min-width:140px;">
        <label>&nbsp;</label>
        <button id="btnClear" class="btn secondary">清空输出</button>
      </div>
    </div>
    <div class="output-box" id="output"></div>
    <div class="status" id="status">引擎尚未启动。</div>
  </div>
</div>

<!-- 加载覆盖层 -->
<div id="overlay">
  <div class="loader">
    <h2>正在加载引擎</h2>
    <p id="loadMsg">正在初始化…</p>
    <div class="bar"><div id="loadBar"></div></div>
    <div class="percent" id="loadPct">0%</div>
  </div>
</div>

<script>
/* ===========================================================
   宿主端（主线程）
   - 下载 WASM 并显示精确的进度百分比
   - 启动/销毁 Worker 来跑引擎
   - 显示引擎输出 + 命令回显
   =========================================================== */

const outputEl   = document.getElementById('output');
const statusEl   = document.getElementById('status');
const overlayEl  = document.getElementById('overlay');
const loadMsgEl  = document.getElementById('loadMsg');
const loadBarEl  = document.getElementById('loadBar');
const loadPctEl  = document.getElementById('loadPct');
const btnRun     = document.getElementById('btnRun');
const btnClear   = document.getElementById('btnClear');
const fenEl      = document.getElementById('fen');
const movetimeEl = document.getElementById('movetime');

let cachedWasmBinary = null;  // Uint8Array：WASM 二进制缓存（WASM 只加载一次）
let cachedJsText    = null;   // string：pikafish.js 文本缓存
let currentWorker   = null;

/* ---------- DOM 辅助 ---------- */
function appendLine(text, cls) {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text + '\n';
  outputEl.appendChild(span);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function setLoadProgress(percent, text) {
  // 范围裁剪，NaN 容错
  const p = Number(percent);
  if (!isFinite(p) || p < 0) {
    // 未知进度：不更新百分比数字
  } else {
    const clamped = Math.min(100, Math.floor(p));
    loadBarEl.style.width = clamped + '%';
    loadPctEl.textContent = clamped + '%';
  }
  if (text !== undefined && text !== null && text !== '') {
    loadMsgEl.textContent = text;
  }
}

btnClear.addEventListener('click', () => {
  outputEl.textContent = '';
});

/* ---------- 绝对 URL 计算 ---------- */
function getWasmAbsoluteBase() {
  const path = location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1);
  return location.origin + path + 'wasm/';
}

/* ---------- 宿主端下载 WASM + 进度 ---------- */
async function downloadWasmWithProgress(wasmBase) {
  const wasmUrl = wasmBase + 'pikafish.wasm';
  const resp = await fetch(wasmUrl);
  if (!resp.ok) throw new Error('下载失败：HTTP ' + resp.status);

  const total = parseInt(resp.headers.get('content-length') || '0', 10);
  if (!resp.body) {
    // 回退：浏览器不支持 streaming body，一次性读
    const ab = await resp.arrayBuffer();
    setLoadProgress(100, '下载完成');
    return new Uint8Array(ab);
  }

  const reader = resp.body.getReader();
  const chunks = [];
  let received = 0;
  while (true) {
    const r = await reader.read();
    if (r.done) break;
    chunks.push(r.value);
    received += r.value.length;

    let pct;
    let msg;
    if (total > 0) {
      pct = (received / total) * 100;
      msg = '下载引擎 ' + (received / 1024 / 1024).toFixed(1) + 'MB / '
          + (total / 1024 / 1024).toFixed(1) + 'MB';
    } else {
      pct = NaN;
      msg = '下载引擎 ' + (received / 1024 / 1024).toFixed(1) + 'MB / 未知';
    }
    setLoadProgress(pct, msg);
  }

  // 组装 Uint8Array（总长度已知）
  const result = new Uint8Array(received);
  let off = 0;
  for (let i = 0; i < chunks.length; i++) {
    result.set(chunks[i], off);
    off += chunks[i].length;
  }
  if (total > 0) setLoadProgress(100, '下载完成，准备启动引擎…');
  return result;
}

/* ---------- 预加载 pikafish.js 文本（同一 URL） ---------- */
async function downloadEngineJs(wasmBase) {
  const url = wasmBase + 'pikafish.js';
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('加载 pikafish.js 失败：HTTP ' + resp.status);
  return await resp.text();
}

/* ============================================================
   Worker 源码模板（作为 Blob Worker 执行）
   initMsg = {
     wasmBinary: Uint8Array | ArrayBuffer,   // 引擎二进制
     engineJs:   string,                     // pikafish.js 全文
     commands:   string[]                    // 待执行 UCI 命令行
   }
   ============================================================ */
function workerSourceTemplate() {
  return [
    '(function(){',
    '  "use strict";',
    '  function post(t){ try{ self.postMessage(t); }catch(e){} }',
    '',
    '  function modulePrint(line) {',
    '    if (line === undefined || line === null) return;',
    '    post({ type: "stdout", text: String(line) });',
    '  }',
    '  function modulePrintErr(line) {',
    '    if (line === undefined || line === null) return;',
    '    post({ type: "stderr", text: String(line) });',
    '  }',
    '',
    '  // stdin：一次性把所有命令行 bytes 喂给引擎，读完就返回 null(EOF)',
    '  var commandStream = "";',
    '  var commandPos = 0;',
    '  function stdinByte() {',
    '    if (commandPos >= commandStream.length) return null;',
    '    var ch = commandStream.charCodeAt(commandPos++);',
    '    return ch;',
    '  }',
    '',
    '  function prepareModule(wasmBinary) {',
    '    var Module = {',
    '      noInitialRun: false,',
    '      noExitRuntime: true,',
    '      arguments: [],',
    '      print:    modulePrint,',
    '      printErr: modulePrintErr,',
    '      wasmBinary: wasmBinary,',
    '    };',
    '    Module["stdin"]  = stdinByte;',
    '    Module["stdout"] = function (c) { return 0; };',
    '    Module["stderr"] = function (c) { return 0; };',
    '    Module["onExit"] = function (code) {',
    '      post({ type: "done", code: code });',
    '    };',
    '    Module["onAbort"] = function (reason) {',
    '      post({ type: "error", text: String(reason) });',
    '    };',
    '    Module["onRuntimeInitialized"] = function () {',
    '      post({ type: "ready" });',
    '    };',
    '    Module["setStatus"] = function (text) {',
    '      // 引擎内部 "Running..." 之类的状态，直接忽略避免干扰进度条',
    '    };',
    '    return Module;',
    '  }',
    '',
    '  self.onmessage = function (ev) {',
    '    var m = ev.data;',
    '    if (!m || m.type !== "init") return;',
    '',
    '    // 1) 命令流：每行末尾加 \\n，UCI 按行读取',
    '    var cmds = Array.isArray(m.commands) ? m.commands.slice() : [];',
    '    commandStream = cmds.map(function(s){ return s + "\\n"; }).join("");',
    '    commandPos = 0;',
    '',
    '    // 2) 准备 Module（含 wasmBinary + stdin/stdout 回调）',
    '    try {',
    '      self.Module = prepareModule(m.wasmBinary);',
    '    } catch (e) {',
    '      post({ type: "error", text: "prepareModule failed: " + String(e && e.message ? e.message : e) });',
    '      return;',
    '    }',
    '',
    '    // 3) 用 Blob URL + importScripts 同步执行 pikafish.js，',
    '    //    让它在 Worker 全局作用域执行，这样它首行能读到 self.Module，',
    '    //    进而读取 wasmBinary、stdin、print 等配置，完成 createWasm + callMain。',
    '    try {',
    '      var jsBlob = new Blob([m.engineJs], { type: "application/javascript" });',
    '      var jsUrl = URL.createObjectURL(jsBlob);',
    '      importScripts(jsUrl);',
    '      URL.revokeObjectURL(jsUrl);',
    '    } catch (e) {',
    '      post({ type: "error", text: "engine.js failed: " + String(e && e.message ? e.message : e) });',
    '    }',
    '  };',
    '})();'
  ].join('\n');
}

/* ============================================================
   启动一次引擎运行（所有点击 / 首次加载的统一入口）
   ============================================================ */
function runEngine(commands, silentInit) {
  // 终止上一个 Worker（如果还在跑）
  if (currentWorker) {
    try { currentWorker.terminate(); } catch (e) {}
    currentWorker = null;
  }

  const wasmBase = getWasmAbsoluteBase();

  // 显示进度条（除非是缓存复用的极简模式）
  overlayEl.classList.remove('hidden');
  if (cachedWasmBinary && cachedJsText) {
    setLoadProgress(90, '使用已缓存的 WASM，正在启动…');
  } else {
    setLoadProgress(0, '正在下载 WASM…');
  }

  // 启动异步准备：(1) 下载或读取缓存 (2) 启动 Worker 并注入
  (async () => {
    try {
      // --- 1) 缓存 WASM（整个文件下载过一次即可） ---
      if (!cachedWasmBinary) {
        cachedWasmBinary = await downloadWasmWithProgress(wasmBase);
      }
      // --- 2) 缓存 pikafish.js 文本（Worker 中通过 new Function 直接 eval） ---
      if (!cachedJsText) {
        setLoadProgress(98, '读取引擎运行时…');
        cachedJsText = await downloadEngineJs(wasmBase);
      }
      setLoadProgress(100, '启动引擎…');

      // --- 3) 创建 Worker，把二进制 + 命令发过去 ---
      const blob = new Blob([workerSourceTemplate()], { type: 'application/javascript' });
      const blobUrl = URL.createObjectURL(blob);
      const worker = new Worker(blobUrl);
      currentWorker = worker;

      let finished = false;
      let lastProgressShown = true;

      worker.onmessage = function (ev) {
        const msg = ev.data;
        if (!msg || !msg.type) return;
        switch (msg.type) {
          case 'ready':
            // 引擎 runtime 初始化完成（main 也已开始执行）
            btnRun.disabled = false;
            statusEl.textContent = '引擎运行中…';
            // 运行开始：隐藏进度覆盖层（输出会直接追加到 output-box）
            overlayEl.classList.add('hidden');
            lastProgressShown = false;
            break;
          case 'stdout':
            appendLine(msg.text, 'out');
            break;
          case 'stderr':
            appendLine(msg.text, 'err');
            break;
          case 'done':
            finished = true;
            btnRun.disabled = false;
            statusEl.textContent = '思考结束。可再次输入 FEN 并点击「开始思考」。';
            appendLine('[系统] 引擎退出（WASM 已加载一次，下次点击跳过下载）。', 'sys');
            overlayEl.classList.add('hidden');
            break;
          case 'error':
            finished = true;
            btnRun.disabled = false;
            appendLine('[错误] ' + msg.text, 'err');
            statusEl.textContent = '引擎出错：' + msg.text;
            overlayEl.classList.add('hidden');
            break;
        }
      };

      worker.onerror = function (ev) {
        finished = true;
        btnRun.disabled = false;
        appendLine('[Worker错误] ' + ev.message, 'err');
        overlayEl.classList.add('hidden');
      };

      // 把两份"拷贝"发送给 Worker（避免 Transferable 导致的 detach 问题）
      // - Uint8Array 通过 structured clone 自动拷贝；wasmBinary 大文件，
      //   直接 postMessage 拷贝即可，速度不慢。
      const engineMsg = {
        type: 'init',
        wasmBinary: cachedWasmBinary,
        engineJs:   cachedJsText,
        commands:   commands
      };
      worker.postMessage(engineMsg);

      // 安全兜底：若引擎在 1 秒内未发送 ready/done/error，
      // 也把进度条挪到 100% 并切换到「运行中」状态，便于后续调错
      setTimeout(function () {
        if (!finished && lastProgressShown) {
          overlayEl.classList.add('hidden');
          statusEl.textContent = '引擎运行中…';
        }
      }, 1500);
    } catch (err) {
      btnRun.disabled = false;
      appendLine('[错误] ' + (err && err.message ? err.message : err), 'err');
      statusEl.textContent = '初始化失败：' + (err && err.message ? err.message : err);
      overlayEl.classList.add('hidden');
    }
  })();
}

/* ============================================================
   事件绑定
   ============================================================ */
btnRun.addEventListener('click', () => {
  const fen = fenEl.value.trim();
  const sec = parseFloat(movetimeEl.value);
  if (!fen) { appendLine('[系统] 请先输入 FEN。', 'sys'); return; }
  if (!sec || sec <= 0) { appendLine('[系统] 请输入 > 0 的时间（秒）。', 'sys'); return; }

  const ms = Math.round(sec * 1000);
  const commands = [
    'uci',
    'isready',
    'position fen ' + fen,
    'go movetime ' + ms,
    'quit'
  ];

  // 回显命令（绿色）
  commands.forEach(function (c) { appendLine('[→] ' + c, 'in'); });

  runEngine(commands, /*silentInit=*/ true);
});

/* 页面首次加载：直接启动一次（空命令 = 引擎初始化 + 立刻 EOF 退出），
   目的是让 WASM 和 JS 都下载好，用户点击"开始思考"时无需再等。 */
window.addEventListener('load', () => {
  runEngine([], /*silentInit=*/ false);
});
</script>
</body>
</html>
