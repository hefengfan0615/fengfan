name: Pikafish WASM

on:
  push:
    branches:
      - main
  workflow_dispatch: 
env:
  EMSDK_PATH: /tmp/emsdk

jobs:
  Pikafish-WASM:
    name: Pikafish WASM
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git $EMSDK_PATH
          cd $EMSDK_PATH
          ./emsdk install latest
          ./emsdk activate latest
          # Make emcc/em++ available in PATH for subsequent steps
          echo "$EMSDK_PATH/upstream/emscripten" >> $GITHUB_PATH
          echo "$EMSDK_PATH" >> $GITHUB_PATH
          # Source and verify in current step
          source $EMSDK_PATH/emsdk_env.sh
          echo "emcc: $(which emcc)"
          emcc --version

      - name: Download NNUE network
        run: |
          source $EMSDK_PATH/emsdk_env.sh
          chmod +x ../scripts/net.sh
          ../scripts/net.sh

      - name: Build WASM (non-relaxed fallback)
        run: |
          source $EMSDK_PATH/emsdk_env.sh
          # Build wasm WITHOUT NNUE embedded — NNUE loaded separately at runtime
          # --pre-js injects a preRun hook for Node.js test to load NNUE from local file
          cat > preload_nnue.js << 'EOF'
          var Module = typeof Module != "undefined" ? Module : {};
          Module["preRun"] = Module["preRun"] || [];
          Module["preRun"].push(function() {
            if (typeof require !== "undefined") {
              var fs = require("fs");
              FS.writeFile("/pikafish.nnue", fs.readFileSync("pikafish.nnue"));
            }
          });
          EOF
          # wasm32（非 relaxed）：面向老浏览器（Chrome <119 / Firefox <121 / Safari <17.4）
          # 前端通过 WebAssembly.validate 检测 relaxed SIMD 支持情况自动选择加载哪个版本
          make -j$(nproc) build \
            ARCH=wasm32 \
            CXX=em++ \
            COMP=gcc \
            EXTRALDFLAGS="--pre-js preload_nnue.js" \
            EXE=pikafish.js

      - name: Build WASM (relaxed-simd)
        run: |
          source $EMSDK_PATH/emsdk_env.sh
          # wasm32-relaxed-simd 仍为单线程 (WASM_SINGLE_THREAD) + 128-bit SIMD，
          # 仅放宽部分 SIMD 语义以允许更快的指令选择 (relaxed_laneselect/madd/dot_product 等)，
          # 同等时间可搜索更多节点 => 更快、更准；浏览器要求 Chrome 119+/Firefox 121+/Safari 17.4+
          make -j$(nproc) build \
            ARCH=wasm32-relaxed-simd \
            CXX=em++ \
            COMP=gcc \
            EXTRALDFLAGS="--pre-js preload_nnue.js" \
            EXE=pikafish.relaxed.js

      - name: Create wasm directory
        run: mkdir -p ../wasm

      - name: Copy artifacts to wasm folder
        run: |
          cp pikafish.js             ../wasm/
          cp pikafish.wasm           ../wasm/
          cp pikafish.relaxed.js     ../wasm/
          cp pikafish.relaxed.wasm   ../wasm/
          cp pikafish.nnue           ../wasm/

      - name: Online test engine search
        working-directory: wasm
        run: |
          echo "=== Testing relaxed-simd engine info ==="
          node pikafish.relaxed.js compiler
          echo "=== Running relaxed-simd bench search test ==="
          node pikafish.relaxed.js bench 16 1 1
          echo "=== Testing non-relaxed engine info ==="
          node pikafish.js compiler
          echo "=== Running non-relaxed bench search test ==="
          node pikafish.js bench 16 1 1

      - name: Sync engine version to frontend
        working-directory: ./
        run: |
          chmod +x scripts/sync-engine-version.sh
          scripts/sync-engine-version.sh

      - name: Commit WASM to master branch
        working-directory: ./
        run: |
          git config user.name "Pikafish Bot"
          git config user.email "pikafish-bot@github.com"
          # Force-add xqwlight/wasm/ (listed in .gitignore) and sync frontend files
          git add -f xqwlight/wasm/ xqwlight/sw.js xqwlight/pikafish.html xqwlight/pikafish-engine.js xqwlight/worker.js scripts/sync-engine-version.sh
          git commit -m "Update WASM build [skip ci]" || echo "No changes to commit"
          git push
