name: Pikafish WASM

on:
  push:
    branches:
      - master

env:
  EMSDK_PATH: /tmp/emsdk

jobs:
  Pikafish-WASM:
    name: Pikafish WASM
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git $EMSDK_PATH
          cd $EMSDK_PATH
          ./emsdk install latest
          ./emsdk activate latest
          # Make emcc/em++ available in PATH for subsequent steps
          echo "$EMSDK_PATH/upstream/emscripten" >> $GITHUB_PATH
          echo "$EMSDK_PATH" >> $GITHUB_PATH
          # Source and verify in current step
          source $EMSDK_PATH/emsdk_env.sh
          echo "emcc: $(which emcc)"
          emcc --version

      - name: Download NNUE network
        run: |
          source $EMSDK_PATH/emsdk_env.sh
          chmod +x ../scripts/net.sh
          ../scripts/net.sh

      - name: Build WASM
        run: |
          source $EMSDK_PATH/emsdk_env.sh
          # Use COMP=gcc: em++ is clang-based, but -dumpversion reports < 16
          # which would trigger the obsolete -fexperimental-new-pass-manager flag with COMP=clang
          make -j$(nproc) build \
            ARCH=wasm32 \
            CXX=em++ \
            COMP=gcc \
            EXTRALDFLAGS="--embed-file pikafish.nnue" \
            EXE=pikafish.js

      - name: Create wasm directory
        run: mkdir -p ../wasm

      - name: Copy artifacts to wasm folder
        run: |
          cp pikafish.js ../wasm/
          cp pikafish.wasm ../wasm/

      - name: Online test engine search
        working-directory: wasm
        run: |
          echo "=== Testing engine info ==="
          node pikafish.js compiler
          echo "=== Running bench search test ==="
          node pikafish.js bench 16 1 8

      - name: Commit WASM to master branch
        working-directory: ./
        run: |
          git config user.name "Pikafish Bot"
          git config user.email "pikafish-bot@github.com"
          # Force-add wasm/ (listed in .gitignore)
          git add -f wasm/
          git commit -m "Update WASM build [skip ci]" || echo "No changes to commit"
          git push