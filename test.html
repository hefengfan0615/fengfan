<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Pikafish WASM 引擎测试</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", sans-serif;
    background: #f4f6fb;
    color: #222;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }
  h1 { margin: 0 0 16px; font-size: 22px; color: #2d3a5f; }
  .desc { color: #6b7280; margin-bottom: 18px; font-size: 14px; line-height: 1.6; }
  .card {
    background: #fff;
    border: 1px solid #e1e5ef;
    border-radius: 10px;
    padding: 18px;
    box-shadow: 0 1px 2px rgba(16,24,40,.04);
  }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 220px; }
  .field.fen { flex: 1 1 100%; }
  label { font-size: 13px; color: #475569; font-weight: 600; }
  input[type="text"], input[type="number"] {
    font: inherit;
    padding: 9px 11px;
    border: 1px solid #cbd2e0;
    border-radius: 6px;
    background: #fbfcff;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    width: 100%;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: #4f7cff;
    box-shadow: 0 0 0 3px rgba(79,124,255,.18);
    background: #fff;
  }
  .btn {
    padding: 9px 16px;
    border: none;
    border-radius: 6px;
    background: #4f7cff;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .btn:hover:not(:disabled) { background: #3b67e8; }
  .btn:disabled { background: #9fb0dc; cursor: not-allowed; }
  .btn.secondary { background: #64748b; }
  .btn.secondary:hover:not(:disabled) { background: #4b5b72; }
  .output-box {
    margin-top: 18px;
    background: #0f172a;
    color: #d1e0ff;
    border-radius: 8px;
    padding: 14px 16px;
    height: 420px;
    overflow-y: auto;
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .output-box .out { color: #d1e0ff; }
  .output-box .in  { color: #7ee2a8; }
  .output-box .err { color: #ff9aa8; }
  .output-box .sys { color: #9cb3ff; font-style: italic; }
  .output-box .dbg { color: #f4c77a; }
  .status { margin-top: 10px; font-size: 13px; color: #5b6478; }
  #overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(15,23,42,.78);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #overlay.hidden { display: none; }
  .loader {
    background: #fff;
    padding: 28px 32px;
    border-radius: 12px;
    width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,.25);
    text-align: center;
  }
  .loader h2 { margin: 0 0 10px; font-size: 17px; color: #2d3a5f; }
  .loader p  { margin: 0 0 14px; font-size: 13px; color: #64748b; min-height: 20px; }
  .bar { width: 100%; height: 10px; background: #eef1f8; border-radius: 99px; overflow: hidden; }
  .bar > div {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#4f7cff,#7aa4ff);
    transition: width .2s ease;
  }
  .percent { margin-top: 10px; font-weight: 700; color: #2d3a5f; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="container">
  <h1>Pikafish WASM 引擎测试</h1>
  <div class="desc">
    输入 FEN 与思考时间（秒），点击「开始思考」。引擎以原生 UCI 协议（stdin / stdout）通信，
    输出将实时追加到下方文本框。WASM 二进制与引擎 JS 文本仅在首次访问时下载，后续复用缓存。
  </div>

  <div class="card">
    <div class="row">
      <div class="field fen">
        <label for="fen">FEN</label>
        <input id="fen" type="text"
               value="rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w - - 0 1">
      </div>
    </div>
    <div class="row" style="margin-top:12px;">
      <div class="field" style="min-width:140px;">
        <label for="movetime">思考时间 (秒)</label>
        <input id="movetime" type="number" min="0.1" step="0.1" value="5">
      </div>
      <div class="field" style="min-width:140px;">
        <label>&nbsp;</label>
        <button id="btnRun" class="btn" disabled>开始思考</button>
      </div>
      <div class="field" style="min-width:140px;">
        <label>&nbsp;</label>
        <button id="btnClear" class="btn secondary">清空输出</button>
      </div>
    </div>
    <div class="output-box" id="output"></div>
    <div class="status" id="status">引擎尚未启动。</div>
  </div>
</div>

<div id="overlay">
  <div class="loader">
    <h2>正在加载引擎</h2>
    <p id="loadMsg">正在初始化…</p>
    <div class="bar"><div id="loadBar"></div></div>
    <div class="percent" id="loadPct">0%</div>
  </div>
</div>

<script>
/* =============================================================
 * 主线程：下载 WASM + JS 文本、显示进度、管理 Worker、显示输出
 * ============================================================= */
const outputEl   = document.getElementById('output');
const statusEl   = document.getElementById('status');
const overlayEl  = document.getElementById('overlay');
const loadMsgEl  = document.getElementById('loadMsg');
const loadBarEl  = document.getElementById('loadBar');
const loadPctEl  = document.getElementById('loadPct');
const btnRun     = document.getElementById('btnRun');
const btnClear   = document.getElementById('btnClear');
const fenEl      = document.getElementById('fen');
const movetimeEl = document.getElementById('movetime');

/* 缓存（WASM 与 JS 文本只下载一次） */
let cachedWasmBinary = null;  // ArrayBuffer
let cachedJsText    = null;   // string
let currentWorker   = null;

/* ---------- DOM 辅助 ---------- */
function appendLine(text, cls) {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text + '\n';
  outputEl.appendChild(span);
  outputEl.scrollTop = outputEl.scrollHeight;
}
function setLoadProgress(percent, text) {
  const p = Number(percent);
  if (isFinite(p) && p >= 0) {
    const clamped = Math.min(100, Math.floor(p));
    loadBarEl.style.width = clamped + '%';
    loadPctEl.textContent = clamped + '%';
  }
  if (text !== undefined && text !== null && text !== '') {
    loadMsgEl.textContent = text;
  }
}
btnClear.addEventListener('click', function () { outputEl.textContent = ''; });

/* ---------- 基于页面 URL 的绝对路径 ---------- */
function getAssetBase() {
  // test.html 与 worker.js、wasm/ 目录在同一位置
  const path = location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1);
  return location.origin + path;
}

/* ---------- 下载 WASM（带进度） ---------- */
async function downloadWasmWithProgress() {
  const url = getAssetBase() + 'wasm/pikafish.wasm';
  appendLine('[调试] 下载 WASM: ' + url, 'dbg');
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('下载失败：HTTP ' + resp.status);
  const totalBytes = parseInt(resp.headers.get('content-length') || '0', 10);
  if (!resp.body) {
    const ab = await resp.arrayBuffer();
    setLoadProgress(100, '下载完成');
    appendLine('[调试] 一次性读取 ' + (ab.byteLength/1024/1024).toFixed(2) + ' MB（无 streaming 模式）', 'dbg');
    return ab;
  }
  const reader = resp.body.getReader();
  const chunks = [];
  let received = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    const pct = totalBytes > 0 ? (received / totalBytes) * 100 : NaN;
    const msg = '下载引擎 ' + (received/1024/1024).toFixed(2) + ' MB / ' +
      (totalBytes > 0 ? (totalBytes/1024/1024).toFixed(2)+' MB' : '未知');
    setLoadProgress(pct, msg);
  }
  const result = new Uint8Array(received);
  let off = 0;
  for (let i = 0; i < chunks.length; i++) { result.set(chunks[i], off); off += chunks[i].length; }
  if (totalBytes > 0) setLoadProgress(100, '下载完成，准备启动引擎…');
  appendLine('[调试] WASM 下载完成 ' + (received/1024/1024).toFixed(2) + ' MB', 'dbg');
  return result.buffer;  // 返回 ArrayBuffer
}

/* ---------- 下载引擎 JS 文本 ---------- */
async function downloadEngineJs() {
  const url = getAssetBase() + 'wasm/pikafish.js';
  appendLine('[调试] 下载引擎 JS: ' + url, 'dbg');
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('加载 pikafish.js 失败：HTTP ' + resp.status);
  const txt = await resp.text();
  appendLine('[调试] JS 文本 ' + (txt.length/1024).toFixed(1) + ' KB', 'dbg');
  return txt;
}

/* ---------- 确保缓存就绪 ---------- */
async function ensureAssets() {
  if (!cachedWasmBinary) {
    cachedWasmBinary = await downloadWasmWithProgress();
  }
  if (!cachedJsText) {
    setLoadProgress(98, '读取引擎运行时…');
    cachedJsText = await downloadEngineJs();
  }
  setLoadProgress(100, '启动引擎…');
}

/* ---------- 启动一个引擎 Worker ---------- */
function runEngine(commands, silentInit) {
  // 终止正在运行的 Worker（如果有）
  if (currentWorker) {
    try { currentWorker.terminate(); } catch (e) {}
    currentWorker = null;
  }

  overlayEl.classList.remove('hidden');
  if (cachedWasmBinary && cachedJsText) {
    setLoadProgress(95, '使用已缓存的 WASM 与 JS，正在启动…');
  } else {
    setLoadProgress(0, '正在下载引擎…');
  }

  ensureAssets().then(function () {
    const worker = new Worker('worker.js');
    currentWorker = worker;

    worker.onmessage = function (ev) {
      const msg = ev.data;
      if (!msg || !msg.type) return;
      switch (msg.type) {
        case 'debug':
          appendLine('[调试] ' + msg.text, 'dbg');
          break;
        case 'stdout':
          appendLine(msg.text, 'out');
          break;
        case 'stderr':
          appendLine(msg.text, 'err');
          break;
        case 'ready':
          btnRun.disabled = false;
          overlayEl.classList.add('hidden');
          statusEl.textContent = '引擎运行中…';
          break;
        case 'done':
          btnRun.disabled = false;
          overlayEl.classList.add('hidden');
          statusEl.textContent = '思考结束。可再次输入 FEN 并点击「开始思考」。';
          appendLine('[系统] 引擎退出（code=' + msg.code + '）', 'sys');
          break;
        case 'error':
          btnRun.disabled = false;
          overlayEl.classList.add('hidden');
          statusEl.textContent = '引擎出错：' + msg.text;
          appendLine('[错误] ' + msg.text, 'err');
          break;
      }
    };
    worker.onerror = function (ev) {
      btnRun.disabled = false;
      overlayEl.classList.add('hidden');
      appendLine('[Worker错误] ' + ev.message, 'err');
    };

    // 构造命令数组 + 发给 Worker
    appendLine('[系统] 发送 ' + commands.length + ' 条 UCI 命令…', 'sys');
    for (let i = 0; i < commands.length; i++) {
      appendLine('[→] ' + commands[i], 'in');
    }
    worker.postMessage({
      type: 'init',
      wasmBinary: cachedWasmBinary,
      engineJs:   cachedJsText,
      commands:   commands
    });
  }).catch(function (err) {
    btnRun.disabled = false;
    overlayEl.classList.add('hidden');
    appendLine('[系统错误] ' + err.message, 'err');
    statusEl.textContent = '初始化失败：' + err.message;
  });
}

/* ---------- 事件绑定 ---------- */
btnRun.addEventListener('click', function () {
  const fen = fenEl.value.trim();
  const sec = parseFloat(movetimeEl.value);
  if (!fen)   { appendLine('[系统] 请先输入 FEN。', 'sys'); return; }
  if (!sec || sec <= 0) { appendLine('[系统] 请输入 > 0 的时间（秒）。', 'sys'); return; }

  const ms = Math.round(sec * 1000);
  const commands = [
    'uci',
    'isready',
    'position fen ' + fen,
    'go movetime ' + ms,
    'quit'
  ];
  runEngine(commands, true);
});

/* 页面首次加载：跑一次空命令（仅初始化），让用户看到引擎能正常启动 */
window.addEventListener('load', function () {
  runEngine([], false);
});
</script>
</body>
</html>
