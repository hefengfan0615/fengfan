* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; min-height: 100vh;
  font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
  background: #f0f2f5;
  color: #333;
}
body {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px;
}
/* ---- 顶栏 ---- */
.header-bar {
  width: 100%; max-width: 560px;

/* ---- 加载覆盖层 ---- */
#overlay {
  position: fixed; inset: 0; z-index: 9999;

  display: flex; align-items: center; justify-content: center;

}

.loader {
  background: #fff; padding: 28px 32px; border-radius: 12px;

}

.loader p { margin: 0 0 14px; font-size: 13px; color: #64748b; min-height: 20px; }
.bar { width: 100%; height: 10px; background: #eef1f8; border-radius: 99px; overflow: hidden; }
.bar > div {

.btn-close {

/* ---- 设置面板内开关样式 ---- */
.toggle {
  position: relative; width: 40px; height: 22px; flex-shrink: 0;

.toggle.on { background: #4f7cff; }
.toggle::after {

    <script type="text/javascript"><!--
"use strict";

/* ---------- 全局错误 ---------- */
window.onerror = function(msg, url, line, col, err) {
  console.error('PikafishUI 全局错误:', msg, url, line, col, err);
  return true;
};
window.addEventListener('unhandledrejection', function(ev) {
  console.error('PikafishUI Promise拒绝:', ev.reason);
});

var STARTUP_FEN = [
  "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w",
  "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKAB1R w",
  "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/9/1C5C1/9/R1BAKAB1R w",
  "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/9/1C5C1/9/RN2K2NR w",
];
var LIMIT_DEPTH = 64;
/* 引擎版本：与 sw.js / xqwlight/sw.js 的 ENGINE_VERSION 保持一致。
 * 改动此值即可让所有用户重新拉取最新引擎资源。 */
var ENGINE_VERSION = "20260619-061331";
var ENGINE_QUERY = "?v=" + ENGINE_VERSION;
var uciStatusEl = document.getElementById('uciStatus');
var engineVersion = '';

/* ---------- UCI → 中文棋谱 ---------- */
var CN_PIECE_R = { K:'帅', A:'仕', B:'相', N:'马', R:'车', C:'炮', P:'兵' };
var CN_PIECE_B = { K:'将', A:'士', B:'象', N:'马', R:'车', C:'炮', P:'卒' };
var CN_NUM_R = ['一','二','三','四','五','六','七','八','九'];
var CN_NUM_B = ['１','２','３','４','５','６','７','８','９'];

function uciToChinese(uci, pos) {
  if (!uci || uci.length < 4) return uci;
  var sf = uci.charCodeAt(0) - 97, sr = uci.charCodeAt(1) - 48;
  var df = uci.charCodeAt(2) - 97, dr = uci.charCodeAt(3) - 48;
  var sqSrc = (sf + 3) + ((12 - sr) << 4);
  var pc = pos.squares[sqSrc];
  if (!pc) return uci;
  var pt = pc & 7, side = pc >> 3;
  var isRed = (side === 1);
  var names = isRed ? CN_PIECE_R : CN_PIECE_B;
  var nums = isRed ? CN_NUM_R : CN_NUM_B;
  var pcChar = ['K','A','B','N','R','C','P'][pt];
  var pName = names[pcChar] || uci;
  var srcFile = isRed ? (9 - sf) : (sf + 1);
  var dstFile = isRed ? (9 - df) : (df + 1);
  var steps = Math.abs(dr - sr);
  var dir;
  if (isRed) { dir = (dr > sr) ? '进' : (dr < sr) ? '退' : '平'; }
  else { dir = (dr < sr) ? '进' : (dr > sr) ? '退' : '平'; }
  var target;
  if (dir === '平') { target = nums[dstFile - 1]; }
  else if (pt === 3 || pt === 1 || pt === 2) { target = nums[dstFile - 1]; }
  else { target = nums[Math.min(steps - 1, 8)]; }
  return pName + nums[srcFile - 1] + dir + target;
}

function pvToChinese(pvMoves, pos) {
  if (!pvMoves || pvMoves.length === 0) return '';
  var result = [], p = pos;
  for (var i = 0; i < pvMoves.length; i++) {
    var cn = uciToChinese(pvMoves[i], p);
    if (cn.length < 4) cn = pvMoves[i];
    result.push(cn);
    var xqw = uciToXqwMove(pvMoves[i]);
    if (xqw > 0) p.makeMove(xqw);
  }
  for (var i = pvMoves.length - 1; i >= 0; i--) {
    var xqw = uciToXqwMove(pvMoves[i]);
    if (xqw > 0) p.undoMakeMove();
  }
  return result.join('　');
}

/* ---------- 引擎信息显示 ---------- */
function showEngineInfo(info) {
  var infoLineEl = document.getElementById('infoLine');
  var pvMovesEl = document.getElementById('pvMoves');
  if (!info || !info.depth) {
    infoLineEl.textContent = '等待引擎...';
    pvMovesEl.textContent = '';
    return;
  }
  infoLineEl.innerHTML = 'depth=<span class="hl">' + info.depth +
    '</span>  score=<span class="hl">' + info.score +
    '</span>  nodes=' + info.nodes;
  if (info.pv && info.pv.length > 0) {
    pvMovesEl.textContent = pvToChinese(info.pv, board.pos);
  } else {
    pvMovesEl.textContent = '';
  }
}

function setLoadProgress(percent, text) {
  var p = Number(percent);
  if (isFinite(p) && p >= 0) {
    document.getElementById('loadBar').style.width = Math.min(100, Math.floor(p)) + '%';
    document.getElementById('loadPct').textContent = Math.min(100, Math.floor(p)) + '%';
  }
  if (text) document.getElementById('loadMsg').textContent = text;
}

/* ---------- 棋盘 ---------- */
var board = new Board(container, "images/", "sounds/");
board.setSearch(0);
board.millis = 3000;
board.computer = 1;          // 兼容 xqwlight，由 compRed/compBlack 驱动
board.compRed = false;       // 电脑执红
board.compBlack = true;      // 电脑执黑（默认）
board.displayFlipped = false;

// 重写 computerMove：支持四种模式
board.computerMove = function() {
  if (board.compRed && board.compBlack) return true;           // 自动对弈
  if (!board.compRed && !board.compBlack) return false;        // 双人对弈
  if (board.compRed && this.pos.sdPlayer == 0) return true;    // 仅电脑执红
  if (board.compBlack && this.pos.sdPlayer == 1) return true;  // 仅电脑执黑
  return false;
};

// 覆盖 flipped：compRed 且 !compBlack 时才翻转（电脑执红 → 红在下方）
board.flipped = function(sq) {
  var flip = board.compRed && !board.compBlack;
  if (board.displayFlipped) flip = !flip;
  return flip ? SQUARE_FLIP(sq) : sq;
};

Board.prototype.response = function() {
  if (this.search == null || !this.computerMove()) { this.busy = false; return; }
  this.thinking.style.visibility = "visible";
  this.busy = true;
  var this_ = this;
  uciStatusEl.textContent = '引擎思考中...';

  var finishSearch = function(mv) {
    try {
      // 设置打开时跳过走棋（防止引擎搜索完成干扰设置后的新对局）
      if (_settingsOpen) { this_.busy = false; this_.flushBoard(); return; }
      if (mv <= 0) { this_.busy = false; this_.flushBoard(); return; }
      if (!this_.pos.legalMove(mv)) { this_.busy = false; this_.flushBoard(); return; }
      if (pikafishSearch && pikafishSearch.lastInfo) showEngineInfo(pikafishSearch.lastInfo);
      this_.addMove(mv, true);
    } catch (e) { this_.busy = false; this_.flushBoard(); }
    this_.thinking.style.visibility = "hidden";
    uciStatusEl.textContent = '引擎就绪';
  };

  setTimeout(function() {
    if (this_.search && typeof this_.search.searchMain === 'function') {
      this_.search.searchMain(LIMIT_DEPTH, this_.millis, finishSearch);
    } else { this_.busy = false; this_.thinking.style.visibility = "hidden"; uciStatusEl.textContent = '引擎未就绪'; }
  }, 50);
};

board.onAddMove = function() {
  var counter = (board.pos.mvList.length >> 1);
  var space = (counter > 99 ? "    " : "   ");
  counter = (counter > 9 ? "" : " ") + counter + ".";
  var text = (board.pos.sdPlayer == 0 ? space : counter) + move2Iccs(board.mvLast);
  var value = "" + board.mvLast;
  try { selMoveList.add(createOption(text, value, false)); }
  catch (e) { selMoveList.add(createOption(text, value, true)); }
  selMoveList.scrollTop = selMoveList.scrollHeight;
};

function createOption(text, value, ie8) {
  var opt = document.createElement("option");
  opt.selected = true; opt.value = value;
  if (ie8) opt.text = text;
  else opt.innerHTML = text.replace(/ /g, "&nbsp;");
  return opt;
}

/* ---------- 控制 ---------- */
function restart_click() {
  selMoveList.options.length = 1;
  selMoveList.selectedIndex = 0;
  board.restart(STARTUP_FEN[0]);
  uciStatusEl.textContent = '引擎就绪';
  document.getElementById('engineVersion').textContent = engineVersion;
  // 重新开始后如果轮到电脑走棋则触发
  if (board.computerMove()) setTimeout(function() { board.response(); }, 200);
}

function retract_click() {
  for (var i = board.pos.mvList.length; i < selMoveList.options.length; i++) board.pos.makeMove(parseInt(selMoveList.options[i].value));
  board.retract();
  selMoveList.options.length = board.pos.mvList.length;
  selMoveList.selectedIndex = selMoveList.options.length - 1;
}

function moveList_change() {
  if (board.result == RESULT_UNKNOWN) { selMoveList.selectedIndex = selMoveList.options.length - 1; return; }
  var from = board.pos.mvList.length, to = selMoveList.selectedIndex;
  if (from == to + 1) return;
  if (from > to + 1) { for (var i = to + 1; i < from; i++) board.pos.undoMakeMove(); }
  else { for (var i = from; i <= to; i++) board.pos.makeMove(parseInt(selMoveList.options[i].value)); }
  board.flushBoard();
}

/* ---------- 翻转棋盘（仅显示翻转，不影响 AI 走棋方） ---------- */
function flipBoard() {
  board.displayFlipped = !board.displayFlipped;
  board.flushBoard();
}

/* ---------- 设置面板 ----------
 * 打开后引擎暂停，修改暂存到 _pending
 * 确定 → 应用并重启对局
 * 取消 → 丢弃修改
 */
var settingsOverlay = document.getElementById('settingsOverlay');
var _pending = {};
var _settingsOpen = false;  // 设置打开时引擎搜索完成跳过走棋

function openSettings() {
  _settingsOpen = true;
  // 保存当前状态到 _pending（UI 只反映 _pending）
  _pending = {
    compRed: board.compRed,
    compBlack: board.compBlack,
    millis: board.millis,
    sound: !!board.sound,
    animated: !!board.animated,
    fen: board.pos.toFen()
  };
  // 同步 UI 到 _pending
  document.getElementById('compRedToggle').className = 'toggle' + (_pending.compRed ? ' on' : '');
  document.getElementById('compBlackToggle').className = 'toggle' + (_pending.compBlack ? ' on' : '');
  document.getElementById('timeSlider').value = (_pending.millis / 1000).toFixed(1);
  document.getElementById('timeDisplay').textContent = (_pending.millis / 1000).toFixed(1);
  document.getElementById('soundToggle').className = 'toggle' + (_pending.sound ? ' on' : '');
  document.getElementById('animToggle').className = 'toggle' + (_pending.animated ? ' on' : '');
  document.getElementById('fenInput').value = _pending.fen;
  settingsOverlay.classList.add('open');
}

document.getElementById('settingsBtn').addEventListener('click', openSettings);

// 暂存修改函数（仅改 _pending + UI，不动 board）
function pendCompRed() {
  _pending.compRed = !_pending.compRed;
  document.getElementById('compRedToggle').classList.toggle('on');
}
function pendCompBlack() {
  _pending.compBlack = !_pending.compBlack;
  document.getElementById('compBlackToggle').classList.toggle('on');
}
function pendThinkTime(val) {
  _pending.millis = Math.round(parseFloat(val) * 1000);
  document.getElementById('timeDisplay').textContent = parseFloat(val).toFixed(1);
}
function pendSound() {
  _pending.sound = !_pending.sound;
  document.getElementById('soundToggle').classList.toggle('on');
}
function pendAnim() {
  _pending.animated = !_pending.animated;
  document.getElementById('animToggle').classList.toggle('on');
}

// 确定：应用修改 → 重启对局
document.getElementById('settingsOk').addEventListener('click', function() {
  board.compRed = _pending.compRed;
  board.compBlack = _pending.compBlack;
  board.millis = _pending.millis;
  board.setSound(_pending.sound);
  board.animated = _pending.animated;
  board.displayFlipped = false;  // 重置翻转，确保棋盘方向与新的 compRed/compBlack 一致

  settingsOverlay.classList.remove('open');
  _settingsOpen = false;

  // 重启对局以应用新设置（使用自定义 FEN 或默认开局）
  var fen = (_pending.fen && _pending.fen.trim()) || STARTUP_FEN[0];
  selMoveList.options.length = 1;
  board.restart(fen);
  if (board.computerMove()) setTimeout(function() { board.response(); }, 200);
  else uciStatusEl.textContent = '引擎就绪';
});

// 取消：丢弃修改，仅关闭
document.getElementById('settingsCancel').addEventListener('click', function() {
  settingsOverlay.classList.remove('open');
  _settingsOpen = false;
});

settingsOverlay.addEventListener('click', function(e) {
  if (e.target === settingsOverlay) { settingsOverlay.classList.remove('open'); _settingsOpen = false; }
});

/* ---------- 引擎初始化 ---------- */
var pikafishSearch = null;

function initEngine() {
  var overlayEl = document.getElementById('overlay');
  overlayEl.classList.remove('hidden');
  setLoadProgress(0, '正在下载引擎二进制...');
  var base = getAssetBaseXqw();

  fetch(base + 'wasm/pikafish.wasm' + ENGINE_QUERY, { cache: "no-store" }).then(function(resp) {
    if (!resp.ok) throw new Error('WASM 下载失败: HTTP ' + resp.status);
    var total = parseInt(resp.headers.get('content-length') || '0', 10);
    if (!resp.body) return resp.arrayBuffer();
    var reader = resp.body.getReader();
    var chunks = [], received = 0;
    function readChunk() {
      return reader.read().then(function(result) {
        if (result.done) {
          var buf = new Uint8Array(received);
          var off = 0;
          for (var i = 0; i < chunks.length; i++) { buf.set(chunks[i], off); off += chunks[i].length; }
          return buf.buffer;
        }
        chunks.push(result.value); received += result.value.length;
        var pct = total > 0 ? (received / total) * 100 : NaN;
        setLoadProgress(pct, '下载引擎 ' + (received/1024/1024).toFixed(2) + ' MB');
        return readChunk();
      });
    }
    return readChunk();
  }).then(function(wasmBinary) {
    setLoadProgress(95, '正在下载引擎脚本...');
    return fetch(base + 'wasm/pikafish.js' + ENGINE_QUERY, { cache: "no-store" }).then(function(resp) {
      if (!resp.ok) throw new Error('JS 下载失败: HTTP ' + resp.status);
      return resp.text().then(function(jsText) { return { wasmBinary: wasmBinary, engineJs: jsText }; });
    });
  }).then(function(assets) {
    setLoadProgress(99, '正在启动引擎...');
    pikafishSearch = new PikafishUciSearch(board.pos, 16);
    pikafishSearch.onUciStdout = function(text) {
      // 捕获引擎版本
      if (text.indexOf('id name ') === 0) {
        engineVersion = text.substring(8);
        document.getElementById('engineVersion').textContent = engineVersion;
      }
    };
    pikafishSearch.onUciStderr = function(text) { console.warn('[pikafish] ' + text); };
    pikafishSearch.onUciDebug = function(text) {};
    pikafishSearch.onInfo = function(info) { showEngineInfo(info); };
    pikafishSearch.wasmBinary = assets.wasmBinary;
    pikafishSearch.engineJs = assets.engineJs;
    return pikafishSearch.startEngine();
  }).then(function() {
    board.search = pikafishSearch;
    document.getElementById('overlay').classList.add('hidden');
    uciStatusEl.textContent = '引擎就绪';
    if (board.computerMove()) setTimeout(function() { board.response(); }, 300);
  }).catch(function(err) {
    document.getElementById('overlay').classList.add('hidden');
    uciStatusEl.textContent = '引擎加载失败：' + (err && err.message ? err.message : String(err));
    console.error('[initEngine] 引擎加载失败:', err);
  });
}

/* ---------- 页面加载 ---------- */
window.addEventListener('load', function() {
  board.restart(STARTUP_FEN[0]);
  initEngine();
  setupServiceWorker();
  // 同步设置面板初始状态
  document.getElementById('timeDisplay').textContent = '3.0';
  document.getElementById('compBlackToggle').classList.add('on');
});

/* ---------- Service Worker ---------- */
function setupServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  var updateBanner = document.getElementById('updateBanner');
  var updateTextEl = document.getElementById('updateText');
  var btnUpdate = document.getElementById('btnUpdate');
  var btnUpdateDismiss = document.getElementById('btnUpdateDismiss');
  var updateDismissed = false;

  function showBanner(msg) { if (updateDismissed) return; if (msg) updateTextEl.textContent = msg; updateBanner.classList.add('show'); }
  function hideBanner() { updateBanner.classList.remove('show'); }

  btnUpdate.addEventListener('click', function() { location.reload(); });
  btnUpdateDismiss.addEventListener('click', function() { updateDismissed = true; hideBanner(); });
  navigator.serviceWorker.addEventListener('message', function(ev) {
    var data = ev.data || {};
    if (data.type === 'ENGINE_UPDATED' || data.type === 'CACHE_UPDATED') showBanner('引擎已更新，刷新后使用最新版本。');
    else if (data.type === 'CACHE_CLEARED') location.reload();
  });
  navigator.serviceWorker.register('sw.js').then(function(reg) {
    if (reg.waiting) showBanner('检测到新版本引擎，刷新后使用最新版本。');
    reg.addEventListener('updatefound', function() {
      reg.installing.addEventListener('statechange', function() {
        if (this.state === 'installed' && navigator.serviceWorker.controller) showBanner('检测到新版本引擎，刷新后使用最新版本。');
      });
    });
    setInterval(function() { reg.update().catch(function() {}); }, 10 * 60 * 1000);
  }).catch(function(err) { console.warn('[SW] 注册失败:', err); });
}

function forceRefresh() {
  if (!navigator.serviceWorker || !navigator.serviceWorker.controller) { location.reload(); return; }
  document.getElementById('btnForce').disabled = true;
  document.getElementById('btnForce').textContent = '清理中…';
  navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_CACHE' });
}
