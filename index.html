<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Pikafish WASM 引擎测试</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", sans-serif;
    background: #f4f6fb;
    color: #222;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }
  h1 { margin: 0 0 16px; font-size: 22px; color: #2d3a5f; }
  .desc { color: #6b7280; margin-bottom: 18px; font-size: 14px; line-height: 1.6; }
  .card {
    background: #fff;
    border: 1px solid #e1e5ef;
    border-radius: 10px;
    padding: 18px;
    box-shadow: 0 1px 2px rgba(16,24,40,.04);
  }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 220px; }
  .field.fen { flex: 1 1 100%; }
  label { font-size: 13px; color: #475569; font-weight: 600; }
  input[type="text"], input[type="number"], textarea {
    font: inherit;
    padding: 9px 11px;
    border: 1px solid #cbd2e0;
    border-radius: 6px;
    background: #fbfcff;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    width: 100%;
  }
  input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
    border-color: #4f7cff;
    box-shadow: 0 0 0 3px rgba(79,124,255,.18);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 70px; font-family: "JetBrains Mono", Menlo, Consolas, monospace; font-size: 13px; }
  .btn {
    padding: 9px 16px;
    border: none;
    border-radius: 6px;
    background: #4f7cff;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .btn:hover:not(:disabled) { background: #3b67e8; }
  .btn:disabled { background: #9fb0dc; cursor: not-allowed; }
  .btn.secondary { background: #64748b; }
  .btn.secondary:hover:not(:disabled) { background: #4b5b72; }
  .output-box {
    margin-top: 18px;
    background: #0f172a;
    color: #d1e0ff;
    border-radius: 8px;
    padding: 14px 16px;
    height: 420px;
    overflow-y: auto;
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .output-box .out { color: #d1e0ff; }
  .output-box .in  { color: #7ee2a8; }
  .output-box .err { color: #ff9aa8; }
  .output-box .sys { color: #9cb3ff; font-style: italic; }
  .output-box .dbg { color: #f4c77a; }
  .status { margin-top: 10px; font-size: 13px; color: #5b6478; }
  #overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(15,23,42,.78);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #overlay.hidden { display: none; }
  .loader {
    background: #fff;
    padding: 28px 32px;
    border-radius: 12px;
    width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,.25);
    text-align: center;
  }
  .loader h2 { margin: 0 0 10px; font-size: 17px; color: #2d3a5f; }
  .loader p  { margin: 0 0 14px; font-size: 13px; color: #64748b; min-height: 20px; }
  .bar { width: 100%; height: 10px; background: #eef1f8; border-radius: 99px; overflow: hidden; }
  .bar > div {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#4f7cff,#7aa4ff);
    transition: width .2s ease;
  }
  .percent { margin-top: 10px; font-weight: 700; color: #2d3a5f; font-variant-numeric: tabular-nums; }
  .update-banner {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: #2d3a5f;
    color: #fff;
    padding: 12px 18px;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    display: none;
    align-items: center;
    gap: 14px;
    z-index: 10000;
    font-size: 14px;
  }
  .update-banner.show { display: flex; }
  .update-banner .btn { padding: 6px 14px; font-size: 13px; }
  .update-banner .close {
    background: transparent; color: #cbd5e1; border: none; cursor: pointer;
    font-size: 18px; line-height: 1; padding: 0 4px;
  }
  .update-banner .close:hover { color: #fff; }
</style>
</head>
<body>
<div class="container">
  <h1>Pikafish WASM 引擎测试</h1>
  <div class="desc">
    输入 FEN 与思考时间（秒），点击「开始思考」。引擎在首次使用中以原生 UCI 协议（stdin / stdout）通信，
    输出将实时追加到下方文本框。本页面使用 Service Worker 缓存引擎资源，断网仍可使用；
    当服务器上的 WASM/JS 更新时，会自动检测并提示刷新。
    如需直接发送 UCI 命令，可填写「UCI 命令」栏（填写后跳过 FEN 路径，按行逐条发送）。
  </div>

  <div class="card">
    <div class="row">
      <div class="field fen">
        <label for="fen">FEN</label>
        <input id="fen" type="text"
               value="rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w - - 0 1">
      </div>
    </div>
    <div class="row" style="margin-top:12px;">
      <div class="field fen">
        <label for="moves">UCI 命令（可选，按行填写；填写后将直接发送这些命令，不执行 FEN 命令）</label>
        <textarea id="moves" rows="3" placeholder="uci
isready
position startpos moves e2e4
go movetime 3000"></textarea>
      </div>
    </div>
    <div class="row" style="margin-top:12px;">
      <div class="field" style="min-width:140px;">
        <label for="movetime">思考时间 (秒)</label>
        <input id="movetime" type="number" min="0.1" step="0.1" value="5">
      </div>
      <div class="field" style="min-width:140px;">
        <label>&nbsp;</label>
        <button id="btnRun" class="btn" disabled>开始思考</button>
      </div>
      <div class="field" style="min-width:140px;">
        <label>&nbsp;</label>
        <button id="btnClear" class="btn secondary">清空输出</button>
      </div>
      <div class="field" style="min-width:140px;">
        <label>&nbsp;</label>
        <button id="btnForce" class="btn secondary" title="清空 Service Worker 缓存并重新下载引擎">强制刷新</button>
      </div>
    </div>
    <div class="output-box" id="output"></div>
    <div class="status" id="status">引擎尚未启动。</div>
  </div>
</div>

<div id="overlay">
  <div class="loader">
    <h2>正在加载引擎</h2>
    <p id="loadMsg">正在初始化…</p>
    <div class="bar"><div id="loadBar"></div></div>
    <div class="percent" id="loadPct">0%</div>
  </div>
</div>

<div class="update-banner" id="updateBanner" role="status" aria-live="polite">
  <span id="updateText">检测到新版本，刷新后可使用最新引擎。</span>
  <button id="btnUpdate" class="btn">立即刷新</button>
  <button class="close" id="btnUpdateDismiss" aria-label="关闭">×</button>
</div>

<script>
/* =============================================================
 * 主线程：页面加载后立即下载 WASM + JS，引擎启动后常驻
 * 备用模式：每次思考重启 Worker，通过 commands 列表发送 UCI 命令
 * ============================================================= */
const outputEl   = document.getElementById('output');
const statusEl   = document.getElementById('status');
const overlayEl  = document.getElementById('overlay');
const loadMsgEl  = document.getElementById('loadMsg');
const loadBarEl  = document.getElementById('loadBar');
const loadPctEl  = document.getElementById('loadPct');
const btnRun     = document.getElementById('btnRun');
const btnClear   = document.getElementById('btnClear');
const fenEl      = document.getElementById('fen');
const movesEl    = document.getElementById('moves');
const movetimeEl = document.getElementById('movetime');

/* 状态 */
let cachedWasmBinary = null;
let cachedJsText    = null;
let currentWorker   = null;
let engineReady     = false;  // engine 已启动并 ready

/* 引擎版本：与 sw.js / xqwlight/sw.js 的 ENGINE_VERSION 保持一致。
 * 改动此值即可让所有用户重新拉取最新引擎资源。 */
const ENGINE_VERSION = "20260619";
const ENGINE_QUERY   = "?v=" + ENGINE_VERSION;

/* ---------- DOM 辅助 ---------- */
function appendLine(text, cls) {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text + '\n';
  outputEl.appendChild(span);
  outputEl.scrollTop = outputEl.scrollHeight;
}
function setLoadProgress(percent, text) {
  const p = Number(percent);
  if (isFinite(p) && p >= 0) {
    const clamped = Math.min(100, Math.floor(p));
    loadBarEl.style.width = clamped + '%';
    loadPctEl.textContent = clamped + '%';
  }
  if (text !== undefined && text !== null && text !== '') {
    loadMsgEl.textContent = text;
  }
}
btnClear.addEventListener('click', function () { outputEl.textContent = ''; });

/* ---------- 基于页面 URL 的绝对路径 ---------- */
function getAssetBase() {
  const path = location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1);
  return location.origin + path;
}

/* ---------- 下载 WASM（带进度） ---------- */
async function downloadWasmWithProgress() {
  const url = getAssetBase() + 'wasm/pikafish.wasm' + ENGINE_QUERY;
  appendLine('[调试] 下载 WASM: ' + url, 'dbg');
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('下载失败：HTTP ' + resp.status);
  const totalBytes = parseInt(resp.headers.get('content-length') || '0', 10);
  if (!resp.body) {
    const ab = await resp.arrayBuffer();
    setLoadProgress(100, '下载完成');
    appendLine('[调试] 一次性读取 ' + (ab.byteLength/1024/1024).toFixed(2) + ' MB', 'dbg');
    return ab;
  }
  const reader = resp.body.getReader();
  const chunks = [];
  let received = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    const pct = totalBytes > 0 ? (received / totalBytes) * 100 : NaN;
    const msg = '下载引擎 ' + (received/1024/1024).toFixed(2) + ' MB / ' +
      (totalBytes > 0 ? (totalBytes/1024/1024).toFixed(2)+' MB' : '未知');
    setLoadProgress(pct, msg);
  }
  const result = new Uint8Array(received);
  let off = 0;
  for (let i = 0; i < chunks.length; i++) { result.set(chunks[i], off); off += chunks[i].length; }
  if (totalBytes > 0) setLoadProgress(100, '下载完成，准备启动引擎…');
  appendLine('[调试] WASM 下载完成 ' + (received/1024/1024).toFixed(2) + ' MB', 'dbg');
  return result.buffer;
}

/* ---------- 下载引擎 JS ---------- */
async function downloadEngineJs() {
  const url = getAssetBase() + 'wasm/pikafish.js' + ENGINE_QUERY;
  appendLine('[调试] 下载引擎 JS: ' + url, 'dbg');
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('加载 pikafish.js 失败：HTTP ' + resp.status);
  const txt = await resp.text();
  appendLine('[调试] JS 文本 ' + (txt.length/1024).toFixed(1) + ' KB', 'dbg');
  return txt;
}

/* ---------- 启动引擎 ---------- */
function startEngine(firstCommands) {
  const worker = new Worker('worker.js');
  currentWorker = worker;

  worker.onmessage = function (ev) {
    const msg = ev.data;
    if (!msg || !msg.type) return;
    switch (msg.type) {
      case 'debug':
        appendLine('[调试] ' + msg.text, 'dbg');
        break;
      case 'stdout':
        appendLine(msg.text, 'out');
        break;
      case 'stderr':
        appendLine(msg.text, 'err');
        break;
      case 'ready':
        engineReady = true;
        btnRun.disabled = false;
        btnRun.textContent = '开始思考';
        overlayEl.classList.add('hidden');
        statusEl.textContent = '引擎已就绪';
        // 发送第一条命令（如果有的话）
        if (firstCommands && firstCommands.length > 0) {
          sendCommands(firstCommands);
          firstCommands = null;
        }
        break;
      case 'done':
        btnRun.disabled = true;
        overlayEl.classList.add('hidden');
        statusEl.textContent = '引擎退出（code=' + msg.code + '），请刷新页面';
        appendLine('[系统] 引擎退出（code=' + msg.code + '）', 'sys');
        break;
      case 'error':
        btnRun.disabled = false;
        overlayEl.classList.add('hidden');
        statusEl.textContent = '引擎出错：' + msg.text;
        appendLine('[错误] ' + msg.text, 'err');
        break;
    }
  };
  worker.onerror = function (ev) {
    btnRun.disabled = false;
    overlayEl.classList.add('hidden');
    appendLine('[Worker错误] ' + ev.message, 'err');
  };

  appendLine('[系统] 正在启动引擎…', 'sys');
  setLoadProgress(99, '正在启动引擎…');
  worker.postMessage({
    type: 'init',
    wasmBinary: cachedWasmBinary,
    engineJs: cachedJsText,
    sab: null,
    sabAvailable: false,
    commands: firstCommands || []
  });
}

/* ---------- 发送 UCI 命令（每次重启 Worker + 命令流） ---------- */
function sendCommands(commands) {
  // 重新启动 Worker + 命令流
  if (currentWorker) {
    try { currentWorker.terminate(); } catch (e) {}
    currentWorker = null;
  }
  engineReady = false;
  overlayEl.classList.remove('hidden');
  setLoadProgress(100, '正在启动引擎…');
  const worker = new Worker('worker.js');
  currentWorker = worker;
  worker.onmessage = function (ev) {
    const msg = ev.data;
    if (!msg || !msg.type) return;
    if (msg.type === 'debug') appendLine('[调试] ' + msg.text, 'dbg');
    else if (msg.type === 'stdout') appendLine(msg.text, 'out');
    else if (msg.type === 'stderr') appendLine(msg.text, 'err');
    else if (msg.type === 'ready') {
      btnRun.disabled = false;
      btnRun.textContent = '开始思考';
      overlayEl.classList.add('hidden');
      statusEl.textContent = '引擎已就绪';
      engineReady = true;
    } else if (msg.type === 'done') {
      overlayEl.classList.add('hidden');
      statusEl.textContent = '思考结束';
      appendLine('[系统] 引擎退出（code=' + msg.code + '）', 'sys');
      // 备用模式：引擎每次思考后退出，下一次点击需重新启动
      currentWorker = null;
      engineReady = false;
    } else if (msg.type === 'error') {
      overlayEl.classList.add('hidden');
      appendLine('[错误] ' + msg.text, 'err');
      currentWorker = null;
      engineReady = false;
    }
  };
  worker.onerror = function (ev) { appendLine('[Worker错误] ' + ev.message, 'err'); };
  appendLine('[系统] 发送 ' + commands.length + ' 条 UCI 命令…', 'sys');
  for (let i = 0; i < commands.length; i++) {
    appendLine('[→] ' + commands[i], 'in');
  }
  worker.postMessage({
    type: 'init',
    wasmBinary: cachedWasmBinary,
    engineJs: cachedJsText,
    sab: null,
    sabAvailable: false,
    commands: commands
  });
}

/* ---------- 事件绑定 ---------- */
btnRun.addEventListener('click', function () {
  const fen   = fenEl.value.trim();
  const rawCmds = movesEl.value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  const sec   = parseFloat(movetimeEl.value);
  if (!sec || sec <= 0) { appendLine('[系统] 请输入 > 0 的时间（秒）。', 'sys'); return; }

  const ms = Math.round(sec * 1000);
  const commands = [];
  if (rawCmds.length > 0) {
    // UCI 命令栏有信息 — 直接发送该栏的命令，不执行 position fen，也不追加 go movetime
    for (let i = 0; i < rawCmds.length; i++) commands.push(rawCmds[i]);
  } else {
    // UCI 命令栏为空 — 使用 FEN + go movetime
    if (!fen) { appendLine('[系统] 请先输入 FEN，或在「UCI 命令」栏填写命令。', 'sys'); return; }
    commands.push('position fen ' + fen);
    commands.push('go movetime ' + ms);
  }

  if (!currentWorker || !engineReady) {
    // 引擎还没启动好 — 排队等待 ready 后发送
    overlayEl.classList.remove('hidden');
    setLoadProgress(99, '引擎正在启动…');
    btnRun.disabled = true;
    btnRun.textContent = '正在启动…';
    startEngine(commands);
  } else {
    // 引擎已启动 — 立即发送命令
    sendCommands(commands);
  }
});

/* =============================================================
 * 页面加载流程：
 *   1. 显示加载层
 *   2. 下载 WASM（带进度）
 *   3. 下载 JS
 *   4. 启动引擎 Worker（备用模式：每次思考重启）
 *   5. 收到 ready 消息 — 隐藏加载层，启用按钮
 * ============================================================= */
window.addEventListener('load', async function () {
  // 1. 显示覆盖层并开始下载
  btnRun.disabled = true;
  btnRun.textContent = '下载中…';
  statusEl.textContent = '正在下载引擎…';
  overlayEl.classList.remove('hidden');
  setLoadProgress(0, '正在下载引擎二进制…');

  try {
    // 2. 下载 WASM + JS
    cachedWasmBinary = await downloadWasmWithProgress();
    setLoadProgress(97, '正在下载引擎 JS…');
    cachedJsText = await downloadEngineJs();

    // 3. 启动引擎 — 备用模式：不预发送命令，每次思考时再启动 Worker
    startEngine(null);
  } catch (err) {
    btnRun.disabled = false;
    btnRun.textContent = '重试下载';
    overlayEl.classList.add('hidden');
    appendLine('[系统错误] ' + err.message, 'err');
    statusEl.textContent = '下载失败：' + err.message;
  }
});

/* =============================================================
 * Service Worker：离线缓存 + 自动检测新版本
 *   - 首次访问安装 SW，预缓存所有静态资源
 *   - 后续访问走 stale-while-revalidate，命中缓存立即返回
 *   - 后台 fetch 检测到资源更新 → 推送 CACHE_UPDATED 消息
 *   - 弹横幅提示用户「立即刷新」以使用新版本引擎
 * ============================================================= */
(function setupServiceWorker() {
  if (!('serviceWorker' in navigator)) return;

  const updateBanner   = document.getElementById('updateBanner');
  const updateTextEl   = document.getElementById('updateText');
  const btnUpdate      = document.getElementById('btnUpdate');
  const btnUpdateDismiss = document.getElementById('btnUpdateDismiss');
  const btnForce       = document.getElementById('btnForce');
  let updateDismissed  = false;

  function showUpdateBanner(msg) {
    if (updateDismissed) return;
    if (msg) updateTextEl.textContent = msg;
    updateBanner.classList.add('show');
  }
  function hideUpdateBanner() { updateBanner.classList.remove('show'); }

  btnUpdate.addEventListener('click', function () { location.reload(); });
  btnUpdateDismiss.addEventListener('click', function () {
    updateDismissed = true;
    hideUpdateBanner();
  });

  /* 「强制刷新」按钮：清空 SW 缓存 → 重新加载 */
  btnForce.addEventListener('click', function () {
    if (!navigator.serviceWorker || !navigator.serviceWorker.controller) {
      appendLine('[系统] 尚未注册 Service Worker，直接刷新页面。', 'sys');
      location.reload();
      return;
    }
    btnForce.disabled = true;
    btnForce.textContent = '清理中…';
    navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_CACHE' });
  });

  /* 接收 SW 推送的消息 */
  navigator.serviceWorker.addEventListener('message', function (ev) {
    const data = ev.data || {};
    if (data.type === 'CACHE_UPDATED') {
      appendLine('[系统] 检测到资源更新：' + data.url, 'sys');
      showUpdateBanner('检测到引擎更新（WASM / JS），刷新页面后立即生效。');
    } else if (data.type === 'CACHE_CLEARED') {
      appendLine('[系统] 缓存已清空，重新加载页面…', 'sys');
      location.reload();
    }
  });

  /* 注册 SW（scope 默认为 sw.js 所在目录） */
  navigator.serviceWorker.register('sw.js').then(function (reg) {
    appendLine('[系统] 已注册 Service Worker：' + reg.scope, 'sys');

    /* 新 SW 安装完成时（页面已被旧 SW 控制）→ 提示刷新 */
    if (reg.waiting) {
      showUpdateBanner('检测到引擎更新（Service Worker），刷新页面后立即生效。');
    }
    reg.addEventListener('updatefound', function () {
      const newWorker = reg.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', function () {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateBanner('检测到引擎更新（Service Worker），刷新页面后立即生效。');
        }
      });
    });

    /* 周期性后台检查（每 10 分钟），及时发现引擎更新 */
    setInterval(function () { reg.update().catch(function () {}); }, 10 * 60 * 1000);
  }).catch(function (err) {
    appendLine('[系统] Service Worker 注册失败：' + err.message, 'err');
  });
})();
</script>
</body>
</html>
